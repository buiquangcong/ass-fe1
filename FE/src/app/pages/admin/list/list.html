<h1>danh sách sản phẩm</h1>

<nz-table #productTable [nzData]="products">
    <thead>
        <tr>
            <th>STT</th>
            <th>Tên sản phẩm</th>
            <th>Ảnh</th>
            <th>Giá tiền</th>
            <th>Danh mục</th>
            <th>Mô tả</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        @for (product of productTable.data; let i=$index; track product.id) {
        <tr>
            <td>{{i+1}}</td>
            <td>{{product.name}}</td>
            <td><img [src]="product.image" width="90" />
            <td>{{product.price}}</td>
            <td>{{product.category}}</td>
            <td>{{product.description}}</td>
            <td>
                <div class="flex gap-2">
                    <button nz-button nzType="primary" [routerLink]="['/admin/edit', product.id]">Sửa</button>
                    <button nz-popconfirm nzPopconfirmTitle="Bạn có chắc muốn xóa sản phẩm này?"
                        (nzOnConfirm)="handleDelete(product.id)" nzOktext="Đồng ý" nzCanceltext="Hủy" nz-button
                        nzType="primary" nzDanger>Xóa</button>
                </div>
            </td>
        </tr>
        }
    </tbody>
</nz-table>
