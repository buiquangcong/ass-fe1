<h1>Thêm sản phẩm mới</h1>

<form nz-form [formGroup]="productform" class="login-form" (ngSubmit)="onSubmit()">
    <nz-form-item>
        <nz-form-control nzErrorTip="Tên không để trống">
            <input type="text" nz-input formControlName="name" placeholder="Tên sản phẩm" />
        </nz-form-control>
    </nz-form-item>
    <nz-form-item>
        <nz-form-control>
            <input type="text" nz-input formControlName="image" placeholder="Ảnh sản phẩm" />
        </nz-form-control>
    </nz-form-item>
    <nz-form-item>
        <nz-form-control nzErrorTip="Giá phải >=1000">
            <input type="text" nz-input formControlName="price" placeholder="Giá sản phẩm" />
        </nz-form-control>
    </nz-form-item>
    <nz-form-item>
        <nz-form-control nzErrorTip="Nhập mô tả">
            <input type="text" nz-input formControlName="description" placeholder="Mô tả sản phẩm" />
        </nz-form-control>
    </nz-form-item>
    <nz-form-item>
        <nz-form-control nzErrorTip="Danh mục không để trống">
            <nz-form-item>
                <nz-form-label [nzSpan]="5">Danh mục</nz-form-label>
                <nz-form-control [nzSpan]="12" nzErrorTip="Danh mục không để trống">
                    <nz-select formControlName="category" nzPlaceHolder="Chọn danh mục">
                        @for (cat of categories; track cat.id){
                        <nz-option [nzValue]="cat.name" [nzLabel]="cat.name"></nz-option>
                        }
                    </nz-select>
                </nz-form-control>
            </nz-form-item>
        </nz-form-control>
    </nz-form-item>
    <button [disabled]="!productform.valid" nz-button class="login-form-button login-form-margin" nzType="primary">Thêm
        mới</button>
</form>
