<header class="w-full border-t-4 border-b border-slate-200 px-4 py-3 flex justify-center">
    <div class="w-full max-w-7xl flex items-center justify-between gap-4 md:gap-8">
        <a href="" class="text-2xl font-black tracking-tighter text-slate-900 shrink-0">SHOP.CO</a>
        <nav class="hidden md:flex items-center gap-6 shrink-0">
            <a href="" class="text-sm font-medium hover:text-primary transition-colors">Shop</a>
            <a href="" class="text-sm font-medium hover:text-primary transition-colors">On Sale</a>
            <a href="" class="text-sm font-medium hover:text-primary transition-colors">New Arrivals</a>
            <a href="" class="text-sm font-medium hover:text-primary transition-colors">Brand</a>
        </nav>
        <label for="" class="relative hidden md:block">
            <input type="text" placeholder="Tìm kiếm"
                class="w-full bg-white border border-slate-200 rounded-full py-2 pl-10 pr-4 text-sm outline-none focus:ring-1 focus:ring-primary">
        </label>
        <aside class="flex items-center gap-2 sm:gap-4 shrink-0">
            <button
                class="relative p-2 hover:bg-white/50 rounded-full transition-colors flex items-center justify-center"
                [routerLink]="'/cart'">
                <img src="/img/giohang.png" alt="" class="w-6 h-6 object-contain">
            </button>
            <button class="relative p-1 hover:bg-white/50 rounded-full">
                <img src="/img/account.png" alt="" class="w-6 h-6 object-contain">
            </button>
        </aside>
    </div>
</header>
